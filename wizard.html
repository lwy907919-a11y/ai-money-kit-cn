async function callGemini(userMessage) {
  const sys = SYSTEMS[currentSystem];
  const fullMessages = [
    ...messages,
    { role: 'user', content: userMessage }
  ];

  // 构造 Gemini API 请求
  const contents = [];

  for (const m of fullMessages) {
    contents.push({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    });
  }

  const requestBody = {
    contents,
    systemInstruction: {
      parts: [{ text: sys.systemPrompt }]
    },
    generationConfig: {
      temperature: 0.85,
      maxOutputTokens: 2048,
      topP: 0.95
    },
    safetySettings: [
      { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
      { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
    ]
  };

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error('API ' + response.status + ': ' + errText.substring(0, 200));
    }

    const data = await response.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!reply) {
      throw new Error('Empty response from Gemini');
    }
    return reply;
  } catch (e) {
    throw e;
  }
}

async function sendMessage() {
  if (isLoading) return;

  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  // 演示模式：检查"已付款"指令
  if (text === '已付款' || text === 'unlock') {
    localStorage.setItem('aimk_paid', 'true');
    isPaid = true;
    addMessage('user', text);
    input.value = '';
    setTimeout(() => {
      addMessage('ai', '✅ 已解锁！现在可以无限对话了。\n\n你想做什么？');
    }, 500);
    return;
  }

  // 试用检查
  if (!isPaid && trialUsed) {
    addMessage('user', text);
    input.value = '';
    setTimeout(() => {
      addMessage('ai', '🔒 免费体验已用完，请先解锁 AI 向导。');
      showPaywall();
    }, 300);
    return;
  }

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';

  addMessage('user', text);
  addTypingIndicator();

  try {
    const reply = await callGemini(text);
    removeTypingIndicator();
    addMessage('ai', reply);
    messages.push({ role: 'user', content: text });
    messages.push({ role: 'assistant', content: reply });

    // 标记试用已用
    if (!isPaid) {
      localStorage.setItem('aimk_trial_' + currentSystem, 'true');
      trialUsed = true;
    }
  } catch (e) {
    removeTypingIndicator();
    addMessage('ai', '❌ 出错了：' + e.message + '\n\n请刷新页面重试，或刷新后输入"已付款"解锁（演示模式）。');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
